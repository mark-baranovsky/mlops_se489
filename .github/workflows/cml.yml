name: CML Model Report

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  cml-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CML
        run: npm install -g @dvcorg/cml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e ".[dev]"

      - name: Run data pipeline
        run: |
          python notebooks/00_setup.py
          python notebooks/01_bronze_ingestion_product_demand.py
          python notebooks/02_silver_cleaning_product_demand.py
          python notebooks/03_gold_weekly_aggregation_product_demand.py
          python notebooks/04_gold_feature_engineering_product_demand.py

      - name: Train model
        run: |
          python notebooks/05_model_training_product_demand.py

      - name: Generate CML report and plots
        run: |
          python scripts/cml_train.py

      - name: Post CML report to PR
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cml comment create reports/cml_report.md
